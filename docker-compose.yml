# 밧디 (batdi) — 로컬 개발 스택
# DoD: `docker compose config -q` 유효성만 검증 (이미지 pull/run 불필요)
#
# ⚠️ 외부(호스트) 포트는 모두 private/높은 포트로 고정 — well-known·기본 포트 금지
#    (다른 로컬 서비스와 충돌 방지). 컨테이너 내부는 기본 포트 사용.
#      · PostgreSQL  외부 54329 → 내부 5432
#      · PgBouncer   외부 54330 → 내부 6432
#      · Langfuse    외부 3010  → 내부 3000

services:
  # ── 애플리케이션 DB (PostgreSQL 16, 호스트 포트 54329 고정) ──
  postgres:
    image: postgres:16
    container_name: batdi-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-batdi}
      POSTGRES_USER: ${POSTGRES_USER:-batdi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-batdi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-batdi} -d ${POSTGRES_DB:-batdi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - batdi-net

  # ── PgBouncer (transaction pooling, 호스트 포트 54330 고정) ──
  # 앱 런타임은 PgBouncer 경유(DATABASE_URL), Prisma 마이그레이션은 PG 직결(DIRECT_URL).
  # transaction pooling 이므로 Prisma 는 DATABASE_URL 에 ?pgbouncer=true 로 prepared
  # statement 를 비활성화한다. (architecture §10.3 / db-schema 커넥션 풀 전략)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: batdi-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "54330:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-batdi}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-batdi}
      DB_NAME: ${POSTGRES_DB:-batdi}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      LISTEN_PORT: "6432"
    networks:
      - batdi-net

  # ── Langfuse (셀프호스팅 관측, 비용 0) ──
  langfuse:
    image: langfuse/langfuse:2
    container_name: batdi-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-changeme-salt}
      TELEMETRY_ENABLED: "false"
      # Headless 초기화 — org/project/user/API키를 부팅 시 자동 시드(UI 수동 가입 불필요).
      # ⚠️ docker-compose 값은 double-quote 금지(Langfuse 공식 주의사항).
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-batdi-org}
      LANGFUSE_INIT_ORG_NAME: Batdi
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-batdi}
      LANGFUSE_INIT_PROJECT_NAME: batdi
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-batdi-local-0000000000}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-batdi-local-0000000000}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@batdi.local}
      LANGFUSE_INIT_USER_NAME: Batdi Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-batdi-admin-pw}
    networks:
      - batdi-net

  # ── Langfuse 전용 DB (내부 네트워크, 외부 미노출) ──
  langfuse-db:
    image: postgres:16
    container_name: batdi-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse} -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - batdi-net

  # ── KBO 크롤러 (전용 컨테이너, HTTP 없음 — 스케줄/백필 전용) ──
  # apps/api 의 KBO 모듈만 standalone 으로 부팅(crawler-main). 1일 1회 04:00 KST 크롤 +
  # 최초 부팅 시 시즌 데이터 없으면 전체 시즌 백필(순차·요청간격 10초·robots 준수).
  # ⚠️ 온디맨드 크롤링 없음. DB 는 같은 네트워크의 postgres/pgbouncer(내부 기본 포트) 사용.
  #    외부 포트 미노출(크롤러는 외부 접근 불필요).
  kbo-crawler:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: batdi-kbo-crawler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    environment:
      KBO_CRAWLER_ENABLED: "true"
      NODE_ENV: production
      TZ: Asia/Seoul
      # 컨테이너→DB 는 docker 네트워크 내부 호스트/기본 포트(postgres:5432, pgbouncer:6432).
      # 런타임은 PgBouncer 경유(transaction pooling), 마이그레이션은 PG 직결(DIRECT_URL).
      DATABASE_URL: postgresql://${POSTGRES_USER:-batdi}:${POSTGRES_PASSWORD:-batdi}@pgbouncer:6432/${POSTGRES_DB:-batdi}?pgbouncer=true
      DIRECT_URL: postgresql://${POSTGRES_USER:-batdi}:${POSTGRES_PASSWORD:-batdi}@postgres:5432/${POSTGRES_DB:-batdi}
    networks:
      - batdi-net

volumes:
  pgdata:
  langfuse-pgdata:

networks:
  batdi-net:
    driver: bridge
