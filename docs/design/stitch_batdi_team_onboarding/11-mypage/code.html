<style>
        body { background-color: #0B0B0E; color: #E8E8EC; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        .typing-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        .iphone-frame { max-width: 393px; height: 852px; margin: 0 auto; position: relative; overflow: hidden; background: #0B0B0E; border: 8px solid #1F1F24; border-radius: 54px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="flex items-center justify-center min-h-screen p-4 bg-neutral-950">
<!-- iPhone 15 Pro Wrapper -->
<div class="iphone-frame flex flex-col">
<!-- Top Bar (From JSON) -->
<header class="bg-[#0B0B0E] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-5 py-3 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-[#F15B2A]/30">
<img alt="Hanwha Eagles Logo" data-alt="Official Hanwha Eagles baseball team logo with orange eagle motif on a clean circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3T6S5eLzP9n6pl6hMbC28uSFo4720Bd8V06STHL5miFOrZqDeH7EHWGX7rL0thWcjTc8lIkSH1F4RcMpaXmN3WOmm4M3v1EuUdSVgtIek1aTnhjMdGo5KM_OftS_hXm2nC5akUw1mdijXGwig6UZ4R8OkxVMRVrmIFFXsGRaMmt7AUCzVFOvWiZOEf_fLwcMV33DdelPeSElKHesHe8d39nclvKr7BZD8J6o38KjxFYfXJoAEw83HbBx5HS5u0NDAAkEHducbgw"/>
</div>
<h1 class="text-[18px] font-bold tracking-tight text-[#E8E8EC]">Batdi · Hanwha</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-[#8A8B93] hover:bg-[#1F1F24] rounded-lg transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
</header>
<!-- Chat Content Canvas -->
<main class="flex-1 overflow-y-auto px-5 py-6 space-y-8">
<!-- User Message (Right) -->
<div class="flex flex-col items-end space-y-1">
<div class="bg-[#F15B2A] text-white px-4 py-3 rounded-[20px] rounded-tr-none max-w-[80%] shadow-lg shadow-[#F15B2A]/10">
<p class="text-[15px] font-medium leading-relaxed">오늘 경기 스코어 알려줘유</p>
</div>
<span class="text-[11px] text-[#5A5B63] mr-1">오후 6:30</span>
</div>
<!-- Bot Response Loading (Left) -->
<div class="flex flex-col items-start space-y-3">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full border-2 border-[#F15B2A] p-0.5 flex items-center justify-center bg-[#111114]">
<span class="material-symbols-outlined text-[14px] text-[#F15B2A]" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<p class="text-[13px] italic text-[#8A8B93] typing-pulse font-medium">잠깐, 밧디가 찾아볼게유~</p>
</div>
<!-- Skeleton Card Area -->
<div class="ml-8 w-full max-w-[280px]">
<div class="h-[140px] bg-[#14151A] border border-[#2A2B33] rounded-[14px] p-4 flex flex-col justify-between">
<!-- Skeleton Header -->
<div class="w-[60px] h-[10px] bg-[#2A2B33] rounded-full"></div>
<!-- Skeleton Scores -->
<div class="flex items-center justify-between gap-3">
<div class="flex-1 h-[28px] bg-[#2A2B33] rounded-lg"></div>
<div class="w-4 h-4 rounded-full bg-[#2A2B33]"></div>
<div class="flex-1 h-[28px] bg-[#2A2B33] rounded-lg"></div>
</div>
<!-- Skeleton Status -->
<div class="space-y-2">
<div class="w-[120px] h-[10px] bg-[#2A2B33] rounded-full"></div>
<div class="w-[80px] h-[8px] bg-[#2A2B33]/50 rounded-full"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Fixed Input Area (Bottom) -->
<div class="bg-[#111114] px-5 pt-4 safe-area-bottom">
<div class="flex items-center gap-3 bg-[#1F1F24] rounded-[24px] pl-5 pr-2 py-2 mb-4">
<div class="flex-1 text-[#5A5B63] text-[15px] font-medium py-2">
                    응답 대기 중...
                </div>
<button class="w-10 h-10 rounded-full bg-[#F15B2A]/50 flex items-center justify-center text-white cursor-not-allowed" disabled="">
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</div>
<!-- Home Indicator Space -->
<div class="w-32 h-1.5 bg-[#1F1F24] rounded-full mx-auto mb-2 opacity-30"></div>
</div>
</div>
