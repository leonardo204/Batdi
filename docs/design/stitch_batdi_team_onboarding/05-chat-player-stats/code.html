<style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0B0B0E;
            color: #E8E8EC;

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            display: none;

            -ms-overflow-style: none;

<body class="bg-surface-container-lowest min-h-screen flex flex-col">
<!-- TopAppBar Section (Shared Component Mapping) -->
<header class="w-full top-0 sticky z-50 bg-[#0B0B0E] flex justify-between items-center px-6 py-4 h-[56px] border-none">
<div class="flex items-center gap-3">
<div class="w-7 h-7 rounded-full border-2 border-primary overflow-hidden flex items-center justify-center bg-surface-container">
<img alt="Hanwha Eagles Logo" class="w-full h-full object-cover" data-alt="Small circular professional sports team badge with a minimalist orange eagle icon on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5tVjcKJZoaMVljhacupwYc1fvwdSLhyYU8vlxlmV0lvS9hp8jP2GU_umbISTPuMcTdHsTogaTVhnSxraSRVBhyyJ6fEiwB_6Xc9eisT0orR6wQvyW9lW99H1fSUNXS1umMXxVTZ2OGMYnpTdBMY-AJnBuKRI9QJXNXMX_p6SIFFCYbm7P1J7PuDTHY8-qkoHj1CsbvlDpyE1jBqfF8OALYCW59BeQLeE9DtWeX5-stYtM5WkLM9u-qn0-s59xwAKGB6IkCWda7Q"/>
</div>
<h1 class="text-primary font-bold text-lg tracking-tight italic">밧디 · 한화</h1>
</div>
<button class="text-on-surface-variant hover:bg-surface-container-high p-1 rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<!-- Main Canvas: Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-32">
<!-- Abstract Mascot/Logo Placeholder -->
<div class="mb-6 relative">
<div class="w-20 h-20 bg-surface-container rounded-[24px] flex items-center justify-center text-outline transition-all duration-300">
<span class="material-symbols-outlined text-[48px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 bg-primary rounded-full border-4 border-background flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
</div>
<!-- Greeting Text -->
<div class="text-center space-y-2">
<h2 class="text-[18px] font-semibold text-on-surface">안녕하셔유! 밧디예유~ 🧡</h2>
<p class="text-[14px] text-on-surface-variant">오늘 한화 경기 궁금한 거 물어봐유!</p>
</div>
<!-- Suggestion Chips Row -->
<div class="w-full mt-10 overflow-x-auto no-scrollbar flex gap-2 justify-center">
<button class="whitespace-nowrap bg-surface-container border border-outline-variant px-[14px] py-[8px] rounded-full text-[13px] text-on-surface hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
                오늘 경기 스코어
            </button>
<button class="whitespace-nowrap bg-surface-container border border-outline-variant px-[14px] py-[8px] rounded-full text-[13px] text-on-surface hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
                팀 순위
            </button>
<button class="whitespace-nowrap bg-surface-container border border-outline-variant px-[14px] py-[8px] rounded-full text-[13px] text-on-surface hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
                최근 뉴스
            </button>
</div>
</main>
<!-- Bottom Input Area -->
<footer class="fixed bottom-0 left-0 w-full bg-background/80 backdrop-blur-md px-4 pt-3 pb-[calc(12px+34px)]">
<div class="max-w-3xl mx-auto flex items-center gap-3">
<div class="relative flex-1">
<input class="w-full h-[52px] bg-surface-container border border-outline-variant rounded-[10px] px-4 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary/50 transition-all text-[15px]" placeholder="밧디에게 물어보기..." type="text"/>
</div>
<button class="w-[40px] h-[40px] bg-primary rounded-full flex items-center justify-center opacity-50 cursor-not-allowed shadow-lg shadow-primary/10 transition-transform active:scale-90" disabled="">
<span class="material-symbols-outlined text-white text-[20px] font-bold">arrow_upward</span>
</button>
</div>
</footer>
<!-- Visual Polish: Soft Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.02] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
