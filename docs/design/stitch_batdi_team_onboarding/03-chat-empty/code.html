<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Batdi - Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#2e2d4c",
                        "on-error": "#690005",
                        "inverse-surface": "#e5e1e6",
                        "surface-variant": "#353438",
                        "primary": "#ffb59f",
                        "on-primary-fixed": "#3a0a00",
                        "surface-bright": "#39393c",
                        "on-tertiary-container": "#5c000b",
                        "secondary": "#c5c3ea",
                        "secondary-fixed-dim": "#c5c3ea",
                        "secondary-fixed": "#e2dfff",
                        "on-primary-container": "#531200",
                        "surface-tint": "#ffb59f",
                        "on-tertiary": "#68000e",
                        "on-secondary-container": "#b4b1d8",
                        "on-secondary-fixed-variant": "#454364",
                        "surface-container-lowest": "#0e0e11",
                        "surface": "#131316",
                        "primary-container": "#F15B2A",
                        "error": "#ffb4ab",
                        "inverse-on-surface": "#303033",
                        "on-secondary-fixed": "#191836",
                        "on-surface": "#e5e1e6",
                        "tertiary-container": "#ff5355",
                        "surface-dim": "#131316",
                        "surface-container-low": "#111114",
                        "background": "#0B0B0E",
                        "tertiary-fixed-dim": "#ffb3af",
                        "outline": "#a98a81",
                        "on-background": "#e5e1e6",
                        "on-tertiary-fixed-variant": "#930017",
                        "tertiary-fixed": "#ffdad7",
                        "surface-container": "#14151A",
                        "on-primary": "#FFFFFF",
                        "error-container": "#93000a",
                        "primary-fixed": "#ffdbd0",
                        "primary-fixed-dim": "#ffb59f",
                        "surface-container-highest": "#353438",
                        "on-surface-variant": "#e2bfb5",
                        "on-tertiary-fixed": "#410005",
                        "tertiary": "#ffb3af",
                        "surface-container-high": "#1F1F24",
                        "inverse-primary": "#af3100",
                        "secondary-container": "#454364",
                        "outline-variant": "#2A2B33",
                        "on-primary-fixed-variant": "#852300",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "sans": ["Pretendard", "Inter", "sans-serif"],
                        "headline": ["Pretendard", "Inter", "sans-serif"],
                        "body": ["Pretendard", "Inter", "sans-serif"],
                        "label": ["Space Grotesk", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Pretendard', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .step-indicator-bg {
            background: linear-gradient(90deg, #F15B2A 66%, #1F1F24 66%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0B0B0E] text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-[#0B0B0E] dark:bg-[#0B0B0E] flex justify-between items-center px-4 h-16">
<div class="flex items-center gap-3">
<button class="text-[#F15B2A] hover:bg-[#1F1F24] transition-colors p-2 rounded-full scale-95 active:opacity-80 transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="font-['Pretendard'] text-[16px] font-semibold tracking-tight text-[#E8E8EC]">Profile Setup</span>
<div class="flex items-center gap-1 mt-0.5">
<div class="h-1 w-12 rounded-full step-indicator-bg"></div>
<span class="text-[10px] text-[#8A8B93] font-medium">Step 2/3</span>
</div>
</div>
</div>
<button class="text-[#8A8B93] font-['Pretendard'] text-[14px] font-medium hover:bg-[#1F1F24] transition-colors px-3 py-1.5 rounded-lg">Skip</button>
</header>
<main class="flex-1 mt-16 px-5 pb-32">
<!-- Hero Title -->
<section class="py-8">
<h1 class="text-2xl font-bold leading-tight mb-2">나만의 야구 친구,<br/><span class="text-[#F15B2A]">밧디</span>를 완성해보세요</h1>
<p class="text-[#8A8B93] text-sm">사용자님의 취향에 맞춰 분석 리포트와 채팅 스타일이 변경됩니다.</p>
</section>
<!-- Section 1: 야구 지식 수준 -->
<section class="mb-10">
<h2 class="text-xs font-semibold uppercase tracking-wider text-[#5A5B63] mb-4">야구 지식 수준</h2>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant text-[#8A8B93] text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
                    입문 🌱
                </button>
<button class="px-5 py-2.5 rounded-full bg-[#F15B2A]/10 border-2 border-[#F15B2A] text-[#F15B2A] text-sm font-bold active:scale-95">
                    중급 ⚾
                </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container border border-outline-variant text-[#8A8B93] text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
                    고수 🔥
                </button>
</div>
</section>
<!-- Section 2: 대화 스타일 -->
<section class="mb-10">
<h2 class="text-xs font-semibold uppercase tracking-wider text-[#5A5B63] mb-4">대화 스타일</h2>
<div class="space-y-3">
<!-- Card 1 (Selected) -->
<div class="bg-[#14151A] rounded-2xl p-4 border-l-[3px] border-[#F15B2A] border-y border-r border-outline-variant/30 flex items-center justify-between group transition-all cursor-pointer">
<div>
<div class="text-[#E8E8EC] font-semibold text-base mb-0.5">기본</div>
<div class="text-[#8A8B93] text-sm">팀 사투리로 자연스럽게</div>
</div>
<span class="material-symbols-outlined text-[#F15B2A]">check_circle</span>
</div>
<!-- Card 2 -->
<div class="bg-[#14151A] rounded-2xl p-4 border border-outline-variant flex items-center justify-between hover:bg-surface-container-high transition-all cursor-pointer">
<div>
<div class="text-[#E8E8EC] font-semibold text-base mb-0.5">친근한</div>
<div class="text-[#8A8B93] text-sm">밈과 드립 많이, 찐팬 느낌</div>
</div>
<div class="w-5 h-5 rounded-full border border-outline-variant"></div>
</div>
<!-- Card 3 -->
<div class="bg-[#14151A] rounded-2xl p-4 border border-outline-variant flex items-center justify-between hover:bg-surface-container-high transition-all cursor-pointer">
<div>
<div class="text-[#E8E8EC] font-semibold text-base mb-0.5">분석형</div>
<div class="text-[#8A8B93] text-sm">데이터 중심, 진지한 야구 토크</div>
</div>
<div class="w-5 h-5 rounded-full border border-outline-variant"></div>
</div>
</div>
</section>
<!-- Section 3: 좋아하는 선수 -->
<section class="mb-6">
<div class="flex justify-between items-end mb-4">
<h2 class="text-xs font-semibold uppercase tracking-wider text-[#5A5B63]">좋아하는 선수 (선택)</h2>
<span class="text-[10px] text-[#5A5B63]">최대 5명</span>
</div>
<div class="relative mb-4">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#5A5B63]">search</span>
<input class="w-full bg-[#14151A] border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-sm text-[#E8E8EC] placeholder:text-[#5A5B63] focus:ring-1 focus:ring-[#F15B2A]/50 focus:border-[#F15B2A] transition-all outline-none" placeholder="선수 검색..." type="text"/>
</div>
<div class="flex flex-wrap gap-2">
<!-- Suggestion Chips -->
<div class="flex items-center gap-1.5 bg-[#14151A] border border-outline-variant py-2 px-3 rounded-lg">
<span class="text-xs text-[#E8E8EC] font-medium">류현진</span>
<span class="material-symbols-outlined text-[14px] text-[#5A5B63] cursor-pointer hover:text-[#F15B2A]">close</span>
</div>
<div class="flex items-center gap-1.5 bg-[#14151A] border border-outline-variant py-2 px-3 rounded-lg">
<span class="text-xs text-[#E8E8EC] font-medium">문동주</span>
<span class="material-symbols-outlined text-[14px] text-[#5A5B63] cursor-pointer hover:text-[#F15B2A]">close</span>
</div>
<!-- Empty State/Placeholder for chips -->
<div class="flex items-center gap-1.5 bg-dashed border border-outline-variant/50 border-dashed py-2 px-3 rounded-lg">
<span class="material-symbols-outlined text-[14px] text-[#5A5B63]">add</span>
<span class="text-xs text-[#5A5B63]">추가하기</span>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-5 pb-8 pt-4 bg-gradient-to-t from-[#0B0B0E] via-[#0B0B0E] to-transparent">
<button class="w-full h-14 bg-[#F15B2A] text-white font-bold rounded-2xl shadow-lg shadow-[#F15B2A]/20 hover:bg-[#ff6d3f] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>밧디와 대화 시작!</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</div>
<!-- BottomNavBar (Suppressed for Onboarding as per Filter Rule) -->
</body></html>
